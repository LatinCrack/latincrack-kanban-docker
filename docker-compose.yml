version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: latincrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanban_db
      POSTGRES_USER: kanban_user
      POSTGRES_PASSWORD: kanban_password_2024
    networks:             # <--- AÑADE ESTO
      - latincrack-network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban_user -d kanban_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Node.js + Express)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: latincrack-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=kanban_db
      - POSTGRES_USER=kanban_user
      - POSTGRES_PASSWORD=kanban_password_2024
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - latincrack-network

  # Frontend React
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: latincrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_USE_DOCKER=true
      - VITE_API_URL=http://api:3000/api
    depends_on:
      - api
    networks:
      - latincrack-network

  # Adminer (opcional) - Interfaz web para gestionar PostgreSQL
  adminer:
    image: adminer:latest
    container_name: latincrack-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - latincrack-network

networks:
  latincrack-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
